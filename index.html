<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#4f46e5" />
  <title>負負得正</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <div id="app">

    <!-- ===== 首頁 ===== -->
    <section id="home" class="screen active">
      <h1 class="logo">負負得正</h1>
      <p class="subtitle">正負數闖關大冒險</p>

      <div class="home-stats">
        <div class="stat-pill"><span class="big">🪙 <b id="home-coins">0</b></span><small>學院幣</small></div>
        <div class="stat-pill"><span class="big">⭐ <b id="home-stars">0</b></span><small>評級星星</small></div>
      </div>

      <button id="start-btn" class="primary big">開始闖關</button>

      <div class="settings-row">
        <button id="sound-toggle" class="setting-btn" aria-label="音效開關">🔊 音效</button>
        <button id="theme-toggle" class="setting-btn" aria-label="深色模式開關">🌙 深色</button>
      </div>
    </section>

    <!-- ===== 關卡地圖 ===== -->
    <section id="map" class="screen">
      <header class="map-top">
        <button id="map-home-btn" class="ghost">← 首頁</button>
        <div class="stats">
          <span>🪙<b id="map-coins">0</b></span>
          <span>⭐<b id="map-stars">0</b></span>
        </div>
      </header>

      <div id="weak-banner" class="weak-banner hidden">
        ⚠️ 弱點警報！答錯累積達標，下一戰將進行「弱點特訓」
      </div>

      <div id="chapters"></div>
    </section>

    <!-- ===== 關卡進行中 ===== -->
    <section id="quiz" class="screen">
      <header class="quiz-top">
        <button id="quit-btn" class="ghost">← 離開</button>
        <div id="quiz-title" class="quiz-title">1-1 正數相加</div>
        <div class="stats">
          <span>連勝 <b id="stat-streak">0</b>🔥</span>
        </div>
      </header>

      <div class="level-row">
        <span id="progress">第 1 / 8 題</span> ・ 答對 <b id="stat-correct">0</b>
      </div>

      <div class="question-card">
        <div id="question" class="question">—</div>
      </div>

      <div id="options" class="options"></div>

      <div id="feedback" class="feedback"></div>
      <div id="explain" class="explain hidden"></div>

      <button id="next-btn" class="primary big hidden">下一題 →</button>
    </section>

    <!-- ===== 關卡結算 ===== -->
    <section id="result" class="screen">
      <h2 id="res-title" class="result-title">過關！</h2>
      <div id="res-stars" class="result-stars">★★★</div>

      <div class="result-card">
        <div class="result-line">答對 <b id="res-correct">0</b> / <b id="res-total">0</b> 題</div>
        <div class="result-line big-star">🪙 學院幣 +<b id="res-coins">0</b></div>
        <div id="res-review" class="res-review hidden"></div>
      </div>

      <button id="res-next-btn" class="primary big hidden">下一關 →</button>
      <button id="res-retry-btn" class="primary big hidden">再挑戰</button>
      <button id="res-map-btn" class="ghost big">回地圖</button>
    </section>

  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
